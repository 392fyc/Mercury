[package]
name = "mercury-gui"
version = "0.1.0"
description = "Mercury — Multi-Agent GUI Orchestrator"
authors = ["you"]
edition = "2021"

[lib]
name = "mercury_gui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-window-state = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "io-util", "rt-multi-thread", "sync", "macros", "time"] }
url = "2"
dirs = "6"
windows-sys = { version = "0.61.2", features = ["Win32_Foundation", "Win32_System_JobObjects"] }
