language: "zh-CN"
tone_instructions: "提供架构层面的洞察，关注系统设计、可扩展性和长期可维护性。同时检查文档与代码的一致性。"

reviews:
  pre_merge_checks:
    docstrings:
      mode: "warning"
      threshold: 50
  profile: "assertive"
  request_changes_workflow: true
  sequence_diagrams: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true
  auto_review:
    enabled: true
    base_branches: ["develop", "master"]
  path_filters:
    - "!**/*.lock"
    - "!dist/**"
    - "!Mercury_KB/**"
    - "!.mercury/transcripts/**"
    - "!.mercury/sessions.json"
    - "!archive/**"
  path_instructions:
    - path: "packages/core/**"
      instructions: "关注 TypeScript 类型安全、接口向后兼容、依赖管理"
    - path: "adapters/**"
      instructions: "关注 adapter 接口一致性、不超过200行、无业务逻辑"
    - path: ".claude/agents/**"
      instructions: "关注 agent 角色定义一致性、职责边界清晰、禁止事项完整"
    - path: ".claude/skills/**"
      instructions: "关注 skill 独立可用性、GATE 完整性、流程正确性"
    - path: ".mercury/**"
      instructions: "关注文档交叉引用正确性、模板占位符完整性"

knowledge_base:
  linked_repositories:
    - repository: "392fyc/Mercury"
      instructions: "Mercury: AI Agent harness framework — session continuity, memory, quality gates"

chat:
  auto_reply: true
